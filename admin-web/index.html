<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>后台管理网页端</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="brand">后台管理</div>
        <nav id="nav"></nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">首页</h1>
            <p class="sub">欢迎回来，<span id="adminName">admin</span></p>
          </div>
          <div class="actions">
            <button id="btnRefresh" class="btn secondary">刷新</button>
            <button id="btnAuth" class="btn">登录 / 注册</button>
            <button id="btnLogout" class="btn danger">退出</button>
          </div>
        </header>

        <section id="view"></section>
      </main>
    </div>

    <dialog id="modal">
      <form method="dialog" id="modalForm">
        <h3 id="modalTitle">提示</h3>
        <p id="modalDesc"></p>
        <label class="field">
          <span>输入内容</span>
          <input id="modalInput" type="text" />
        </label>
        <menu>
          <button value="cancel" class="btn secondary">取消</button>
          <button value="ok" class="btn">确定</button>
        </menu>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
